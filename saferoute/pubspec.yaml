name: saferoute
description: SafeRoute - AI-Powered Crime-Aware Navigation Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.2.0
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  dio: ^5.4.3+1
  google_fonts: ^6.2.1
  url_launcher: ^6.2.6
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  google_sign_in: ^6.2.1
  connectivity_plus: ^6.0.3
  pin_code_fields: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
